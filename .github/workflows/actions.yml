# .github/workflows/actions.yml

# 이름 짓기
name: Github Actions 연습하기 최상단
# on: 언제 이 작업을 실행할지 정의
# push: github에 push할 때마다 실행
on: push

jobs:
  push-job: #작명
    runs-on: ubuntu-latest
    steps:
      - name: 첫 번째 작업
        run: echo "첫 번째 작업 실행 중"

      - name: 여러 명령어 문장 작성하기
        run: |
          echo "첫 번째 명령어"
          echo "두 번째 명령어"

      - name: github actions 자체에 저장된 변수를 사용해보기
        run: |
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY

      - name: Github Actions Secret 변수 사용해보기
        run: |
          echo ${{ secrets.MY_NAME }}
          echo ${{ secrets.MY_HOBBY }}

      - name: Github Repository 불러오기
        uses: actions/checkout@v5 #uses: 액션을 지정하는 키워드이며, 해당 액션의 github 저장소와 사용할 버전을 가리킴

      - name: Node.js 설치하기
        uses: actions/setup-node@v6
        with: 
          node-version: '24'

      - name: 의존성(라이브러리) 설치
        run : npm ci

      - name: 테스트 실행하기
        run : npm run test
